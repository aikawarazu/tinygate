main:
  push:
    - name: go-test
      docker:
        image: golang:1.22
      stages:
        - name: test
          script: go test ./... -v

    - name: build-binaries
      docker:
        image: golang:1.22
      stages:
        - name: build linux
          script: |
            mkdir -p dist
            CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o dist/tinygate-linux-amd64 .
        - name: build windows
          script: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o dist/tinygate-windows-amd64.exe .

    - name: docker-build
      services:
        - docker
      docker:
        image: golang:1.22
      stages:
        - name: build binary
          script: CGO_ENABLED=0 GOOS=linux go build -o tinygate .
        - name: build and push image
          script: |
            TAG=$(date +%Y%m%d-%H%M%S)
            docker build -t ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest -t ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${TAG} .
            docker push ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest
            docker push ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${TAG}

  pull_request:
    - name: go-test
      docker:
        image: golang:1.22
      stages:
        - name: test
          script: go test ./... -v
