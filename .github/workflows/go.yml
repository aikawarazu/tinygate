name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v4
      with:
        go-version: '1.22'
    - name: Test
      run: go test -v ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v4
      with:
        go-version: '1.22'

    - name: Build Linux
      run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o dist/tinygate-linux-amd64 .

    - name: Build Windows
      run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o dist/tinygate-windows-amd64.exe .

    - name: Upload Linux
      uses: actions/upload-artifact@v4
      with:
        name: tinygate-linux-amd64
        path: dist/tinygate-linux-amd64

    - name: Upload Windows
      uses: actions/upload-artifact@v4
      with:
        name: tinygate-windows-amd64
        path: dist/tinygate-windows-amd64.exe
