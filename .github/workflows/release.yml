name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  binaries:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v4
      with:
        go-version: '1.22'

    - name: Build Linux
      run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o dist/tinygate-linux-amd64 .

    - name: Build Windows
      run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o dist/tinygate-windows-amd64.exe .

    - name: Upload Linux
      uses: actions/upload-artifact@v4
      with:
        name: tinygate-linux-amd64
        path: dist/tinygate-linux-amd64

    - name: Upload Windows
      uses: actions/upload-artifact@v4
      with:
        name: tinygate-windows-amd64
        path: dist/tinygate-windows-amd64.exe

  docker:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v4
      with:
        go-version: '1.22'

    - name: Build binary
      run: CGO_ENABLED=0 GOOS=linux go build -o tinygate .

    - name: Log in to ghcr.io
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      run: |
        TAG=${{ github.ref_name }}
        docker build -t ghcr.io/${{ github.repository_owner }}/tinygate:latest -t ghcr.io/${{ github.repository_owner }}/tinygate:${TAG} .
        docker push ghcr.io/${{ github.repository_owner }}/tinygate:latest
        docker push ghcr.io/${{ github.repository_owner }}/tinygate:${TAG}
