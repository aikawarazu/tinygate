name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  binaries:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v4
      with:
        go-version: '1.22'

    - name: Build Linux
      run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o dist/tinygate-linux-amd64 .

    - name: Build Windows
      run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o dist/tinygate-windows-amd64.exe .

    - name: Upload Linux
      uses: actions/upload-artifact@v4
      with:
        name: tinygate-linux-amd64
        path: dist/tinygate-linux-amd64

    - name: Upload Windows
      uses: actions/upload-artifact@v4
      with:
        name: tinygate-windows-amd64
        path: dist/tinygate-windows-amd64.exe

  docker:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v4
      with:
        go-version: '1.22'

    - name: Build binary
      run: CGO_ENABLED=0 GOOS=linux go build -o tinygate .

    - name: Build Docker image
      run: docker build -t tinygate:latest .

    - name: Export image
      run: docker save tinygate:latest | gzip > dist/tinygate.tar.gz

    - name: Upload Docker image
      uses: actions/upload-artifact@v4
      with:
        name: tinygate-docker
        path: dist/tinygate.tar.gz
